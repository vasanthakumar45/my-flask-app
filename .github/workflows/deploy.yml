name: Flask CD Pipeline

on:
  push:
    branches: [main]

jobs:

  # ─── Job 1: Run Tests First ───────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  # ─── Job 2: Deploy to EC2 ─────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'

            echo "🚀 Starting deployment..."

            # ── Fix 1: Use correct path ──────────────
            PROJECT_DIR="/root/my-flask-app"

            # Check if project exists, clone if not
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📥 Project not found, cloning..."
              git clone git@github.com:${{ secrets.GITHUB_REPOSITORY }} $PROJECT_DIR
            fi

            cd $PROJECT_DIR

            # ── Fix 2: Pull latest code ──────────────
            echo "📥 Pulling latest code..."
            git pull origin main

            # ── Fix 3: Handle both docker compose versions ──
            echo "🐳 Restarting Docker containers..."
            if docker compose version > /dev/null 2>&1; then
              echo "Using docker compose (v2)"
              docker compose down
              docker compose up --build -d
            else
              echo "Using docker-compose (v1)"
              docker-compose down
              docker-compose up --build -d
            fi

            # Wait for containers
            sleep 5

            # Verify
            echo "✅ Verifying deployment..."
            docker ps

            echo "🎉 Deployment successful!"
          ENDSSH

      - name: Verify App is Running
        run: |
          sleep 15
          curl -f http://${{ secrets.EC2_HOST }}:5000/health || exit 1
          echo "✅ App is live!"
